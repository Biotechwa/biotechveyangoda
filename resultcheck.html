<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Upgrade | Biotech Laboratory</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            height: 100dvh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        /* Professional Subtle Animations */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.15); }
            100% { box-shadow: 0 0 0 15px rgba(13, 148, 136, 0); }
        }

        .animate-fade-in { animation: fade-in-up 0.6s ease-out forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }

        .glass-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.08);
        }

        .icon-container {
            animation: pulse-ring 2.5s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        .whatsapp-btn {
            background-color: #1e293b; /* Formal dark button */
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }
        
        .whatsapp-icon {
            color: #25D366; /* Keep whatsapp green for brand recognition */
        }
        
        /* Subtle grid background */
        .bg-grid {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-grid">

    <!-- Main Content Container -->
    <div class="glass-card relative z-10 w-[90%] max-w-md p-8 md:p-10 rounded-2xl text-center animate-fade-in opacity-0">
        
        <!-- Professional Icon/Illustration -->
        <div class="relative w-20 h-20 mx-auto mb-6">
            <div class="relative w-full h-full bg-slate-50 rounded-full flex items-center justify-center icon-container border border-slate-200">
                <i class="fa-solid fa-microscope text-3xl text-slate-700"></i>
            </div>
            <!-- Plus badge -->
            <div class="absolute bottom-0 right-0 bg-teal-600 text-white w-7 h-7 rounded-full flex items-center justify-center shadow border-2 border-white">
                <i class="fa-solid fa-plus text-xs"></i>
            </div>
        </div>

        <!-- Typography -->
        <h1 class="text-2xl font-bold text-slate-800 mb-2 tracking-tight animate-fade-in opacity-0 delay-100">Service Enhancement</h1>
        <p class="text-slate-500 text-sm leading-relaxed mb-6 animate-fade-in opacity-0 delay-200">
            We are performing scheduled upgrades to our patient portal to ensure the highest standard of service. We apologize for any inconvenience.
        </p>

        <div class="w-10 h-0.5 bg-slate-200 mx-auto mb-6"></div>

        <p class="text-slate-700 font-medium text-sm mb-4 animate-fade-in opacity-0 delay-300">
            To securely request your laboratory reports, please contact our support team via WhatsApp.
        </p>

        <!-- WhatsApp Call to Action -->
        <div class="animate-fade-in opacity-0 delay-300">
            <a href="https://wa.me/94773524143?text=Hello,%20I%20would%20like%20to%20request%20my%20lab%20report." 
               target="_blank"
               class="whatsapp-btn flex items-center justify-center gap-3 w-full py-3.5 px-6 rounded-xl text-white font-semibold text-base cursor-pointer no-underline">
                <i class="fa-brands fa-whatsapp text-xl whatsapp-icon"></i>
                Request via WhatsApp
            </a>
        </div>

        <!-- Footer / Contact Note -->
        <div class="mt-8 pt-5 border-t border-slate-100 flex items-center justify-center gap-2 text-slate-400 text-xs font-semibold uppercase tracking-wider animate-fade-in opacity-0 delay-300">
            <i class="fa-solid fa-phone"></i> Support Line: 077 352 4143
        </div>

    </div>

</body>
</html>
