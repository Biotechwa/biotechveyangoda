<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biotech | AI Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
            height: 100dvh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        /* Keyframe Animations */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes pulse-ring { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse-slow { animation: pulse-ring 2s infinite; }
        .animate-blob { animation: blob 7s infinite alternate; }

        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .chat-container {
            width: 100%;
            height: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .chat-container {
                height: 90vh;
                border-radius: 32px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(15, 118, 110, 0.25);
            }
        }

        .chat-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14.5px;
            line-height: 1.6;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            word-wrap: break-word;
        }

        .msg-bot {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05);
        }

        .msg-user {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.3);
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .option-btn {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-weight: 700;
            color: #0f766e;
            transition: all 0.3s;
            cursor: pointer;
        }

        .option-btn:hover {
            border-color: #0d9488;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.1);
        }

        .typing-dots { display: flex; gap: 4px; padding: 4px 0; align-items: center;}
        .dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        .custom-input {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 16px; 
        }
        .custom-input:focus {
            background: white;
            border-color: #0d9488;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }
        
        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            border-radius: 16px;
            padding: 12px 20px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-top: 10px;
            transition: 0.2s;
            width: 100%;
            justify-content: center;
        }
        .whatsapp-btn:hover { background-color: #20bd5a; transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- BG Elements -->
    <div class="absolute top-0 left-0 w-80 h-80 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob" style="animation-delay: 2s;"></div>

    <div class="chat-container glass-effect">

                    <i class="fa-solid fa-microscope text-2xl"></i>
                </div>
            </div>

            <h1 class="text-white font-extrabold text-xl tracking-wide relative z-10">BIOTECH LABORATORY</h1>
            <p class="text-teal-100 text-[10px] font-medium tracking-widest relative z-10 uppercase">AI Clinical Assistant</p>
            
            <button onclick="resetLanguage()" class="absolute top-4 right-4 text-white/50 hover:text-white transition">
                <i class="fa-solid fa-globe"></i>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-body" id="chatBody"></div>

        <!-- Security Footer -->
        <div class="p-4 bg-white/50 border-t border-teal-100/50 text-center">
            <div class="flex items-center justify-center gap-2 text-teal-600/60 font-bold text-[9px] tracking-widest uppercase">
                <i class="fa-solid fa-shield-halved"></i> AI Privacy Protected Scan

        </div>

        <!-- Language Picker -->

            <div class="w-full max-w-[300px] p-6 text-center">

                    <i class="fa-solid fa-language text-2xl"></i>

                <div class="flex flex-col gap-3">
                    <button onclick="saveAndInit('en')" class="option-btn !bg-white">English</button>
                    <button onclick="saveAndInit('si')" class="option-btn !bg-white" style="font-family: 'Noto Sans Sinhala'">සිංහල</button>

                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBody = document.getElementById('chatBody');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzWPVGayDSH6uWrBROFQjaFi1U6Il-d2x-LMExuW5ejWn-1ZJYLuCkBLHPG7n93ONDN/exec';
        
        let currentLang = 'en';
        let formData = { type: '', num: '', date: '' };

        const i18n = {
            en: {
                welcome: "Hello! 👋 I'm your Biotech Assistant. I'll help you access your lab reports.",
                askType: "Select your <b>Sample Type</b>:",
                askNum: "Enter your <b>Sample Number</b>:",
                askDate: "When was this collected?",
                askBill: "For security, please upload a photo of your <b>Biotech Laboratory Bill</b>:",
                btnUpload: "📸 Upload Bill",
                scanning: "AI is scanning your document...",
                scanSuccess: "Verification successful!",
                scanFail: "Could not match the sample number on the bill. Please ensure the bill is clear.",
                btnWhatsapp: "<i class='fa-brands fa-whatsapp text-xl'></i> Collect via WhatsApp",
                saving: "Preparing your report...",
                ready: "Redirecting...",
            },
            si: {
                welcome: "ආයුබෝවන්! 👋 මම Biotech සහායකයා. ඔබගේ වාර්තා ලබා ගැනීමට මම උදව් කරන්නම්.",
                askType: "ඔබේ <b>සාම්පල වර්ගය</b> තෝරන්න:",
                askNum: "<b>සාම්පල අංකය</b> ඇතුළත් කරන්න:",
                askDate: "සාම්පලය ලබාගත් <b>දිනය</b>:",
                askBill: "ආරක්ෂාව තහවුරු කිරීම සඳහා, කරුණාකර ඔබගේ <b>Biotech රසායනාගාර බිල්පතෙහි</b> ඡායාරූපයක් උඩුගත කරන්න:",
                btnUpload: "📸 බිල්පත උඩුගත කරන්න",
                scanning: "AI මගින් බිල්පත පරීක්ෂා කරමින් පවතී...",
                scanSuccess: "තහවුරු කිරීම සාර්ථකයි!",
                scanFail: "බිල්පතේ ඇති සාම්පල අංකය තහවුරු කළ නොහැක. කරුණාකර පැහැදිලි ඡායාරූපයක් ලබා දෙන්න.",
                btnWhatsapp: "<i class='fa-brands fa-whatsapp text-xl'></i> WhatsApp හරහා ලබා ගන්න",
                saving: "වාර්තාව සූදානම් වෙමින් පවතී...",
                ready: "විවෘත වෙමින් පවතී...",
            },
            ta: {
                welcome: "வணக்கம்! 👋 நான் உங்கள் Biotech உதவியாளர்.",
                askType: "உங்கள் <b>மாதிரி வகை</b>யைத் தேர்ந்தெடுக்கவும்:",
                askNum: "உங்கள் <b>மாதிரி எண்</b>ணை உள்ளிடவும்:",
                askDate: "மாதிரி எடுக்கப்பட்ட <b>தேதி</b>:",
                askBill: "பாதுகாப்பிற்காக உங்கள் <b>Biotech ஆய்வக ரசீதின்</b> புகைப்படத்தைப் பதிவேற்றவும்:",
                btnUpload: "📸 ரசீதை பதிவேற்றவும்",
                scanning: "AI உங்கள் ரசீதை ஸ்கேன் செய்கிறது...",
                scanSuccess: "சரிபார்ப்பு வெற்றி!",
                scanFail: "ரசீதில் உள்ள மாதிரி எண்ணை சரிபார்க்க முடியவில்லை. தெளிவான படத்தை வழங்கவும்.",
                btnWhatsapp: "<i class='fa-brands fa-whatsapp text-xl'></i> WhatsApp மூலம் பெறவும்",
                saving: "அறிக்கை தயாராகிறது...",
                ready: "திறக்கப்படுகிறது...",
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem('biotech_assistant_lang');
            if (saved) initApp(saved);
            else document.getElementById('langModal').classList.remove('hidden');
        };

        function saveAndInit(l) {
            localStorage.setItem('biotech_assistant_lang', l);
            initApp(l);
        }

        function resetLanguage() {
            localStorage.removeItem('biotech_assistant_lang');
            location.reload();
        }

        function initApp(l) {
            currentLang = l;
            document.getElementById('langModal').classList.add('hidden');
            addMessage(i18n[currentLang].welcome, 'bot');
            setTimeout(step1_Type, 800);
        }

        function step1_Type() {
            addMessage(`
                <div>
                    ${i18n[currentLang].askType}
                    <div class="option-grid">
                        <div class="option-btn" onclick="selectType('VG')">VG</div>
                        <div class="option-btn" onclick="selectType('BN')">BN</div>
                        <div class="option-btn" onclick="selectType('NI')">NI</div>
                        <div class="option-btn" onclick="selectType('BR')">BR</div>
                    </div>
                </div>
            `, 'bot');
        }

        function selectType(v) {
            formData.type = v;
            addMessage(v, 'user');
            setTimeout(step2_Num, 600);
        }

        function step2_Num() {
            const id = 'n' + Date.now();
            addMessage(`
                <div>
                    ${i18n[currentLang].askNum}
                    <div class="mt-3 flex gap-2">
                        <input type="number" id="${id}" class="custom-input" placeholder="0000">
                        <button onclick="submitNum('${id}')" class="bg-teal-600 text-white w-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
            `, 'bot');
            document.getElementById(id).focus();
        }

        function submitNum(id) {
            const val = document.getElementById(id).value;
            if(!val) return;
            formData.num = val;
            document.getElementById(id).disabled = true;
            addMessage(val, 'user');
            setTimeout(step3_Date, 600);
        }

        function step3_Date() {
            const id = 'd' + Date.now();
            const today = new Date().toISOString().split('T')[0];
            addMessage(`
                <div>
                    ${i18n[currentLang].askDate}
                    <div class="mt-3 flex gap-2">
                        <input type="date" id="${id}" value="${today}" class="custom-input">
                        <button onclick="submitDate('${id}')" class="bg-teal-600 text-white w-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
            `, 'bot');
        }

        function submitDate(id) {
            const val = document.getElementById(id).value;
            formData.date = val;
            document.getElementById(id).disabled = true;
            addMessage(val, 'user');
            setTimeout(step4_UploadBill, 600);
        }

        function step4_UploadBill() {
            const id = 'file' + Date.now();
            addMessage(`
                <div>
                    ${i18n[currentLang].askBill}
                    <div class="mt-4" id="uploadWrapper-${id}">
                        <input type="file" id="${id}" accept="image/*" class="hidden" onchange="handleFileUpload(this, '${id}')">
                        <label for="${id}" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-3 rounded-2xl font-bold text-sm cursor-pointer inline-flex items-center gap-2 shadow-md w-full justify-center">
                            ${i18n[currentLang].btnUpload}
                        </label>
                    </div>
                </div>
            `, 'bot');
        }

        function handleFileUpload(input, id) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            // Hide button immediately so they don't double click
            document.getElementById(`uploadWrapper-${id}`).style.display = 'none';

            const reader = new FileReader();
            reader.onload = (e) => {
                // To prevent API Payload limits, we MUST compress phone photos first
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1024; // Resize large images
                    const MAX_HEIGHT = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Compress to 70% quality JPEG (reduces 10MB to ~150KB)
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Show compressed thumbnail
                    addMessage(`<img src="${compressedDataUrl}" class="rounded-xl max-w-full h-auto max-h-48 border border-teal-500/20 object-cover shadow-sm" />`, 'user');
                    
                    // Extract just the raw base64 data for the API
                    const rawBase64 = compressedDataUrl.split(',')[1];
                    processBillWithGeminiVision(rawBase64, 'image/jpeg');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function processBillWithGeminiVision(base64Data, mimeType) {
            const loadingMsg = addMessage(`
                <div class="typing-dots">
                    <i class="fa-solid fa-expand text-teal-500 animate-pulse"></i> 
                    <span class="ml-2 font-medium text-teal-700">${i18n[currentLang].scanning}</span>
                </div>
            `, 'bot');

            const apiKey = "AIzaSyBqPSOC8m1E5ncsd5GDycgkZLCXgfjznG0"; 
            const modelName = "gemini-1.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            const fullSampleId = `${formData.type}${formData.num}`.toUpperCase();
            
            // Highly forgiving instructions for Dot-Matrix
            const promptText = `Examine this laboratory receipt carefully. Look specifically for the "Sample No" (usually at the top right). The user is claiming their number is ${fullSampleId}. Because this is a dot-matrix printer, letters are often printed with missing dots (e.g. 'B' looks like '8', 'N' looks like 'M' or 'H', 'V' looks like 'U'). Does the text contain ${fullSampleId} or a very obvious dot-matrix misprint of it? Answer STRICTLY with the single word "YES" if found, or "NO" if missing.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            role: "user",
                            parts: [
                                { text: promptText },
                                { inlineData: { mimeType: mimeType, data: base64Data } }
                            ]
                        }]
                    })
                });

                if (!response.ok) {
                    const errInfo = await response.text();
                    console.error("API Error Response:", errInfo);
                    throw new Error("API request failed: " + response.status);
                }

                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text?.toUpperCase().trim() || "";
                
                console.log("AI Answered:", aiResponse); // Useful for debugging in browser console

                if (aiResponse.includes("YES")) {
                    loadingMsg.innerHTML = `<i class="fa-solid fa-check-circle text-green-500 text-lg"></i> <span class="font-bold text-green-700 ml-1">${i18n[currentLang].scanSuccess}</span>`;
                    setTimeout(processData, 1000); 
                } else {
                    showWhatsAppFallback(loadingMsg);
                }
            } catch (err) {
                console.error("AI System Failure:", err);
                showWhatsAppFallback(loadingMsg);
            }
        }

        function showWhatsAppFallback(msgElement) {
            const fullSampleId = `${formData.type}${formData.num}`;
            const timeStr = new Date().toLocaleTimeString('en-US'); // Includes seconds

            // Exactly the requested format
            const rawMsg = `Please send online report following details\n sample num- ${fullSampleId}\n date - ${formData.date}\n patient send time - ${timeStr}`;
            
            const encodedMsg = encodeURIComponent(rawMsg);
            const waUrl = `https://wa.me/94773524143?text=${encodedMsg}`;

            msgElement.innerHTML = `
                <div class="text-rose-600 font-medium mb-3 text-sm border border-rose-200 bg-rose-50 p-3 rounded-xl">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i> ${i18n[currentLang].scanFail}
                </div>
                <a href="${waUrl}" target="_blank" class="whatsapp-btn">
                    ${i18n[currentLang].btnWhatsapp}
                </a>
            `;
        }

        async function processData() {
            const loading = addMessage('<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', 'bot');
            
            const params = new URLSearchParams({
                type: formData.type,
                sampleNumber: formData.num,
                date: formData.date,
                phone: 'verified_via_AI_scan',
                language: currentLang
            });

            fetch(`${scriptURL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' })
                .catch(e => console.log("Save failed", e));

            setTimeout(() => {
                loading.innerHTML = `<i class="fa-solid fa-database mr-2 text-teal-500"></i> ${i18n[currentLang].saving}`;
                
                setTimeout(() => {
                    loading.innerHTML = `<i class="fa-solid fa-lock-open text-green-500 mr-2"></i> ${i18n[currentLang].ready}`;
                    
                    const id = formData.type + formData.num;
                    const expiry = new Date().getTime() + (14 * 24 * 60 * 60 * 1000);
                    const encoded = btoa(`${id}|${formData.date}|${expiry}`);
                    
                    setTimeout(() => {
                        window.location.href = `https://biotechveyangoda.lk/report-preview.html?data=${encoded}`;
                    }, 1500);
                }, 2000);
            }, 1000);
        }

        function addMessage(html, sender) {
            const d = document.createElement('div');
            d.className = `msg msg-${sender}`;
            d.innerHTML = html;
            chatBody.appendChild(d);
            chatBody.scrollTop = chatBody.scrollHeight;
            return d; 
        }
    </script>
</body>
</html>
