<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biotech SMS Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #0ea5e9;
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Background Animation Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }
        .c1 { width: 300px; height: 300px; background: var(--primary); top: -50px; left: -50px; }
        .c2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -100px; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s forwards ease-out;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--secondary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        /* Phone Input Specifics */
        .iti { width: 100%; }
        .iti__country-list { 
            background-color: #1e293b; 
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
        }
        .iti__country:hover { background-color: #334155; }
        .iti__selected-flag { border-radius: 10px 0 0 10px; }

        .send-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
            filter: brightness(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="container">
        <h2><i class="fas fa-paper-plane text-secondary"></i> Biotech SMS</h2>
        
        <div class="input-group">
            <label for="phone">Recipient Number</label>
            <input type="tel" id="phone">
        </div>

        <div class="input-group">
            <label for="message">Message Content</label>
            <textarea id="message" placeholder="Type message... (Supports line breaks)"></textarea>
        </div>

        <button class="send-btn" id="sendBtn" onclick="sendSMS()">
            <span id="btn-text">Send Message</span>
            <i class="fas fa-paper-plane" id="btn-icon"></i>
            <div class="loader" id="loader"></div>
        </button>

        <div id="status-box" class="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script>
        let iti;

        document.addEventListener("DOMContentLoaded", function() {
            const phoneInput = document.getElementById("phone");
            iti = window.intlTelInput(phoneInput, {
                initialCountry: "lk",
                separateDialCode: true,
                preferredCountries: ["lk", "ae", "gb", "qa", "au"],
                utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
            });
        });

        async function sendSMS() {
            const messageInput = document.getElementById('message').value;
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const loader = document.getElementById('loader');
            const statusBox = document.getElementById('status-box');
            const sendBtn = document.getElementById('sendBtn');

            // 1. Validation
            if (!iti.isValidNumber()) {
                showStatus("Please enter a valid phone number.", "error");
                return;
            }
            if (!messageInput.trim()) {
                showStatus("Please enter a message.", "error");
                return;
            }

            // 2. Loading State
            sendBtn.disabled = true;
            btnText.style.display = 'none';
            btnIcon.style.display = 'none';
            loader.style.display = 'block';
            statusBox.style.display = 'none';

            // 3. Construct Payload
            const fullNumber = iti.getNumber(); // International format e.g. +94...
            const encodedMsg = encodeURIComponent(messageInput);
            
            const username = "TW01036_biotech_lab_tr";
            const password = "hGHA4S@eKQFOS";
            const src = "BIOTECH+Lab";
            
            // Note: dst is URI encoded to safely pass the '+' sign
            const url = `https://msg.text-ware.com/send_sms.php?username=${username}&password=${password}&src=${src}&dst=${encodeURIComponent(fullNumber)}&msg=${encodedMsg}`;

            try {
                // Using no-cors as many SMS gateways don't have explicit CORS headers for browsers
                await fetch(url, { method: 'GET', mode: 'no-cors' });
                
                setTimeout(() => {
                    resetButton();
                    showStatus("Message sent successfully!", "success");
                    document.getElementById('message').value = "";
                }, 800);
            } catch (error) {
                resetButton();
                showStatus("Failed to reach gateway.", "error");
                console.error('Error:', error);
            }
        }

        function resetButton() {
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = false;
            document.getElementById('btn-text').style.display = 'inline';
            document.getElementById('btn-icon').style.display = 'inline';
            document.getElementById('loader').style.display = 'none';
        }

        function showStatus(text, type) {
            const statusBox = document.getElementById('status-box');
            statusBox.innerText = text;
            statusBox.className = "status " + type;
            statusBox.style.display = 'block';
        }
    </script>
</body>
</html>
