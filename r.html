<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biotech Laboratory | Secure Verification</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Poppins & Multilingual) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">

    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f1f5f9;
            height: 100dvh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom right, #f0fdf4, #eff6ff);
        }

        /* Custom Theme Animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(13, 148, 136, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(13, 148, 136, 0); }
        }

        @keyframes blob { 
            0% { transform: translate(0px, 0px) scale(1); } 
            33% { transform: translate(30px, -50px) scale(1.1); } 
            66% { transform: translate(-20px, 20px) scale(0.9); } 
            100% { transform: translate(0px, 0px) scale(1); } 
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse-slow { animation: pulse-ring 2s infinite; }
        .animate-blob { animation: blob 7s infinite alternate; }

        /* Matched Glass Effect */
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .chat-container {
            width: 100%;
            height: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .chat-container {
                height: 90vh;
                border-radius: 24px;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            }
        }

        .chat-body {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .msg-bot {
            background: white;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #f3f4f6;
        }

        .msg-user {
            background: linear-gradient(135deg, #0d9488 0%, #0284c7 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .option-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            color: #0f766e;
            transition: all 0.3s;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .option-btn:hover {
            border-color: #0d9488;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.1);
        }

        .custom-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 16px; 
            color: #1f2937;
        }
        .custom-input:focus {
            background: white;
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        #qr-reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: none !important;
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.1);
            background: #000;
        }
        #qr-reader img { display: none; }
        #qr-reader__scan_region { background: #000; }
        #qr-reader__dashboard { padding: 12px !important; background: white; border-top: 1px solid #f1f5f9; }
        #qr-reader__dashboard_section_csr button {
            background: linear-gradient(to right, #0d9488, #0284c7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.2s;
        }
        #qr-reader__dashboard_section_csr button:hover { opacity: 0.9; }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 to-blue-50">

    <div class="absolute top-0 left-0 w-64 h-64 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
    <div class="absolute bottom-0 right-0 w-64 h-64 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob" style="animation-delay: 2s;"></div>

    <div class="chat-container glass-effect shadow-2xl transition-all duration-300 hover:shadow-teal-200/50">
        
        <div class="bg-gradient-to-r from-teal-600 to-blue-600 p-8 text-center relative overflow-hidden shrink-0">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
            
            <div class="relative inline-block mb-4">
                <div class="absolute inset-0 bg-white rounded-full opacity-20 animate-pulse-slow"></div>
                <div class="relative bg-white text-teal-600 w-16 h-16 rounded-full flex items-center justify-center shadow-lg mx-auto animate-float">
                    <i class="fa-solid fa-microscope text-3xl"></i>
                </div>
            </div>

            <h1 class="text-white font-bold text-2xl tracking-wide relative z-10">BIOTECH LABORATORY</h1>
            <p class="text-teal-100 text-sm font-light tracking-wider relative z-10 uppercase">Identity Verification</p>
            
            <button onclick="resetLanguage()" class="absolute top-4 right-4 text-white/50 hover:text-white transition">
                <i class="fa-solid fa-globe"></i>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-body" id="chatBody"></div>

        <!-- Security Footer -->
        <div class="p-4 bg-white/50 border-t border-gray-100 text-center shrink-0">
            <div class="flex items-center justify-center gap-2 text-gray-400 font-semibold text-[10px] tracking-widest uppercase">
                <i class="fa-solid fa-lock"></i> End-to-End Encrypted Verification
            </div>
        </div>

        <div id="langModal" class="absolute inset-0 bg-white/95 backdrop-blur-md z-50 flex items-center justify-center hidden">
            <div class="w-full max-w-[300px] p-6 text-center">
                <div class="w-16 h-16 bg-gradient-to-r from-teal-600 to-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl rotate-3">
                    <i class="fa-solid fa-language text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-6 font-['Poppins']">Select Language</h3>
                <div class="flex flex-col gap-3">
                    <button onclick="saveAndInit('en')" class="option-btn bg-white">English</button>
                    <button onclick="saveAndInit('si')" class="option-btn bg-white" style="font-family: 'Noto Sans Sinhala'">සිංහල</button>
                    <button onclick="saveAndInit('ta')" class="option-btn bg-white" style="font-family: 'Noto Sans Tamil'">தமிழ்</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBody = document.getElementById('chatBody');
        let currentLang = 'en';
        let formData = { phone: '', sample: '', date: '', patientName: '' };
        let html5QrCode;

        // Translations tailored to privacy and QR flow
        const i18n = {
            en: {
                welcome: "Hello! 👋 Welcome to the Biotech Secure Portal.",
                askPhone: "For your privacy, please verify your <b>Phone Number</b> first:",
                askQR: "Perfect. Now, please scan the <b>QR Code</b> located on your patient receipt to securely load your details.",
                btnScan: "Open Secure Scanner",
                processing: "Authenticating QR Data...",
                ready: "Verification Successful! Generating secure link...",
                errorQR: "⚠️ Invalid QR format. Please scan a valid receipt.",
                btnForceContinue: "Give Permission & Continue",
                btnScanAgain: "Scan Again"
            },
            si: {
                welcome: "ආයුබෝවන්! 👋 Biotech ආරක්‍ෂිත පද්ධතියට සාදරයෙන් පිළිගනිමු.",
                askPhone: "ඔබගේ ආරක්ෂාව සඳහා, කරුණාකර පළමුව ඔබගේ <b>දුරකථන අංකය</b> තහවුරු කරන්න:",
                askQR: "හරි. දැන් කරුණාකර ඔබගේ බිල්පතේ ඇති <b>QR කේතය</b> ස්කෑන් කරන්න.",
                btnScan: "ස්කෑනරය විවෘත කරන්න",
                processing: "දත්ත පරීක්ෂා කරමින්...",
                ready: "සාර්ථකයි! ආරක්‍ෂිත සබැඳිය සකසමින් පවතී...",
                errorQR: "⚠️ මෙය Biotech රසායනාගාරයේ QR කේතයක් නොවේ.",
                btnForceContinue: "අවසර දී ඉදිරියට යන්න",
                btnScanAgain: "නැවත ස්කෑන් කරන්න"
            },
            ta: {
                welcome: "வணக்கம்! 👋 Biotech பாதுகாப்பான போர்ட்டலுக்கு வரவேற்கிறோம்.",
                askPhone: "உங்கள் பாதுகாப்பிற்காக, முதலில் உங்கள் <b>தொலைபேசி எண்ணை</b> சரிபார்க்கவும்:",
                askQR: "நன்று. இப்போது, உங்கள் பில்லில் உள்ள <b>QR குறியீட்டை</b> ஸ்கேன் செய்யவும்.",
                btnScan: "லைவ் ஸ்கேனரைத் திறக்கவும்",
                processing: "தரவு சரிபார்க்கப்படுகிறது...",
                ready: "வெற்றி! பாதுகாப்பான இணைப்பு உருவாக்கப்படுகிறது...",
                errorQR: "⚠️ இது Biotech ஆய்வக QR அல்ல.",
                btnForceContinue: "அனுமதி அளித்து தொடரவும்",
                btnScanAgain: "மீண்டும் ஸ்கேன் செய்யவும்"
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem('biotech_secure_lang');
            if (saved) initApp(saved);
            else document.getElementById('langModal').classList.remove('hidden');
        };

        function saveAndInit(l) {
            localStorage.setItem('biotech_secure_lang', l);
            initApp(l);
        }

        function resetLanguage() {
            localStorage.removeItem('biotech_secure_lang');
            location.reload();
        }

        function initApp(l) {
            currentLang = l;
            document.getElementById('langModal').classList.add('hidden');
            addMessage(i18n[currentLang].welcome, 'bot');
            setTimeout(step1_Phone, 800);
        }

        function step1_Phone() {
            const id = 'phone' + Date.now();
            addMessage(`
                <div>
                    ${i18n[currentLang].askPhone}
                    <div class="mt-3 flex gap-2">
                        <input type="tel" id="${id}" class="custom-input" placeholder="07XXXXXXXX">
                        <button onclick="submitPhone('${id}')" class="bg-gradient-to-r from-teal-600 to-blue-600 text-white w-12 rounded-xl flex items-center justify-center hover:opacity-90 transition shadow-md"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
            `, 'bot');
            
            setTimeout(() => {
                const input = document.getElementById(id);
                input.focus();
                
                // Add support for pressing Enter key
                input.addEventListener("keypress", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        submitPhone(id);
                    }
                });
            }, 100);
        }

        function submitPhone(id) {
            const val = document.getElementById(id).value;
            // Strict regex for Sri Lankan numbers
            const regex = /^(0\d{9})$/;
            if(!regex.test(val.replace(/\s/g, ''))) {
                document.getElementById(id).style.borderColor = 'red';
                addMessage(`<span class="text-red-500">Please enter a valid 10-digit number.</span>`, 'bot');
                return;
            }
            
            formData.phone = val.replace(/\s/g, '');
            document.getElementById(id).disabled = true;
            addMessage(formData.phone, 'user');
            setTimeout(step2_QRScan, 600);
        }

        function step2_QRScan() {
            const id = 'qrbtn' + Date.now();
            addMessage(`
                <div>
                    ${i18n[currentLang].askQR}
                    <div class="mt-4" id="qr-container">
                        <button id="${id}" onclick="startQRScanner('${id}')" class="w-full bg-teal-50 border-2 border-dashed border-teal-300 text-teal-700 py-4 rounded-xl flex flex-col items-center justify-center hover:bg-teal-100 transition shadow-sm">
                            <i class="fa-solid fa-qrcode text-3xl mb-2 animate-pulse-slow"></i>
                            <span class="font-bold text-sm uppercase tracking-wider">${i18n[currentLang].btnScan}</span>
                        </button>
                        <div id="qr-reader" class="hidden mt-2"></div>
                    </div>
                </div>
            `, 'bot');
        }

        function startQRScanner(btnId) {
            document.getElementById(btnId).classList.add('hidden');
            const qrReaderDiv = document.getElementById('qr-reader');
            qrReaderDiv.classList.remove('hidden');

            html5QrCode = new Html5Qrcode("qr-reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

            html5QrCode.start({ facingMode: "environment" }, config, 
                (decodedText) => {
                    // Success callback
                    html5QrCode.stop().then(() => {
                        qrReaderDiv.classList.add('hidden');
                        document.getElementById(btnId).classList.remove('hidden');
                        document.getElementById(btnId).className = "w-full bg-green-50 border border-green-200 text-green-700 py-4 rounded-xl flex flex-col items-center justify-center opacity-80";
                        document.getElementById(btnId).innerHTML = `<i class="fa-solid fa-check-circle text-3xl mb-1"></i><span class="font-bold text-sm uppercase tracking-wider">Scanned</span>`;
                        document.getElementById(btnId).disabled = true;
                        
                        processQRData(decodedText);
                    });
                },
                (errorMessage) => {
                    // Ongoing scan errors (ignore)
                }
            ).catch((err) => {
                console.error("Camera error:", err);
                addMessage(`<span class="text-red-500">Camera access denied. Please check your browser permissions.</span>`, 'bot');
            });
        }

        function processQRData(qrText) {
            addMessage(`<i class="fa-solid fa-circle-notch fa-spin text-teal-600 mr-2"></i> ${i18n[currentLang].processing}`, 'bot');
            
            setTimeout(() => {
                try {
                    let extracted = false;
                    qrText = qrText.trim(); 
                    
                    // --- UPDATED LOGIC TO MATCH SPECIFIC QR OUTPUT ---
                    // Example Match: "Sample NO:NI18 2026-07-14 Miss theekshana"
                    
                    // Regex for Date (YYYY-MM-DD)
                    const dateRegex = /\d{4}-\d{2}-\d{2}/;
                    // Regex for Sample Number (Extracts letters/numbers after "Sample NO:" or standalone IDs like NI18, VG22)
                    const sampleRegex = /(?:Sample\s*NO:\s*|^|\s)([A-Za-z]{2,3}\d+)/i;

                    if (dateRegex.test(qrText) && sampleRegex.test(qrText)) {
                        const dMatch = qrText.match(dateRegex);
                        const sMatch = qrText.match(sampleRegex);

                        formData.date = dMatch[0];
                        formData.sample = sMatch[1].toUpperCase();

                        // Get Patient Name (Everything safely extracted after the Date string)
                        let textAfterDate = qrText.substring(qrText.indexOf(dMatch[0]) + dMatch[0].length).trim();
                        
                        // Clean up any stray symbols if they accidentally exist in the string
                        textAfterDate = textAfterDate.replace(/^[|,\s]+|[|,\s]+$/g, '');

                        if (textAfterDate.length > 0) {
                            formData.patientName = textAfterDate;
                        } else {
                            formData.patientName = "Patient";
                        }
                        
                        extracted = true;
                    } 
                    // --- Fallback Mechanism for standard JSON just in case ---
                    else if (qrText.startsWith('{')) {
                        const data = JSON.parse(qrText);
                        formData.sample = data.sampleNo || data.sample;
                        formData.date = data.date;
                        formData.patientName = data.patient || data.name || "Patient";
                        extracted = true;
                    }

                    // Display Verification Results & Build Final Base64
                    if(extracted && formData.sample && formData.date) {
                        addMessage(`<i class="fa-solid fa-shield-check text-green-500 mr-2 text-lg"></i> <span class="font-bold text-green-600">${i18n[currentLang].ready}</span><br><br>
                        <span class="text-xs text-slate-500">
                        <b>Patient:</b> ${formData.patientName}<br>
                        <b>Sample ID:</b> ${formData.sample}<br>
                        <b>Date:</b> ${formData.date}
                        </span>`, 'bot');
                        
                        generateBase64Link();
                    } else {
                        // Fallback behavior if format doesn't match at all
                        formData.patientName = "Unknown Patient";
                        formData.sample = "UNKNOWN";
                        formData.date = new Date().toISOString().split('T')[0];
                        generateBase64Link();
                    }

                } catch (e) {
                    addMessage(`<span class="text-rose-500 font-medium">${i18n[currentLang].errorQR}</span>`, 'bot');
                    setTimeout(step2_QRScan, 2000);
                }
            }, 1000);
        }

        function generateBase64Link() {
            // TARGET FORMAT: Patient Name | Sample ID | Date
            const rawData = `${formData.patientName}|${formData.sample}|${formData.date}`;
            
            // Encode dynamically and handle special spaces/symbols
            const base64Encoded = btoa(unescape(encodeURIComponent(rawData)));
            
            // Redirect after 2.5 seconds to the preview portal
            setTimeout(() => {
                window.location.href = `https://biotechveyangoda.lk/labreport-preview.html?data=${base64Encoded}`;
            }, 2500);
        }

        function addMessage(html, sender) {
            const d = document.createElement('div');
            d.className = `msg msg-${sender}`;
            d.innerHTML = html;
            chatBody.appendChild(d);
            
            setTimeout(() => {
                chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: 'smooth' });
            }, 50);
            return d;
        }
    </script>
</body>
</html>
